<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #dbdbdb;
      --text: #262626;
      --muted: #8e8e8e;
      --blue: #0095f6;
      --red: #ed4956;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── NAVBAR ─── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .nav-inner {
      width: 975px;
      max-width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .nav-logo {
      font-size: 24px;
      font-family: 'Georgia', serif;
      font-style: italic;
      letter-spacing: -0.5px;
      text-decoration: none;
      color: var(--text);
    }
    .nav-search {
      width: 268px;
      height: 36px;
      background: #efefef;
      border: 1px solid transparent;
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      cursor: text;
    }
    .nav-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
    }
    .nav-search input::placeholder { color: var(--muted); }
    .nav-actions { display: flex; align-items: center; gap: 22px; }
    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      color: var(--text);
      position: relative;
    }
    .nav-btn:hover { opacity: 0.6; }
    .notif-dot {
      position: absolute;
      top: -2px; right: -4px;
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      border: 2px solid white;
    }
    .nav-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4);
      padding: 2px;
      cursor: pointer;
    }
    .nav-avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #c9a0b0;
      border: 2px solid white;
    }

    /* ─── LAYOUT ─── */
    .main-layout {
      max-width: 935px;
      margin: 0 auto;
      padding-top: 80px;
      display: grid;
      grid-template-columns: 1fr 293px;
      gap: 28px;
      padding-left: 16px;
      padding-right: 16px;
    }

    /* ─── STORIES ─── */
    .stories-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stories-bar::-webkit-scrollbar { display: none; }
    .stories-list {
      display: flex;
      gap: 8px;
      white-space: nowrap;
    }
    .story-item {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      flex-shrink: 0;
      width: 66px;
    }
    .story-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      padding: 2.5px;
      background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    }
    .story-ring.seen {
      background: #dbdbdb;
    }
    .story-av {
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 2.5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }
    .story-name {
      font-size: 11px;
      color: var(--text);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 60px;
    }
    .story-add {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: white;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .story-add-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #efefef;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .story-add-icon {
      position: absolute;
      bottom: 0; right: 0;
      width: 20px; height: 20px;
      background: var(--blue);
      border-radius: 50%;
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
    }

    /* ─── POSTS ─── */
    .post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-bottom: 24px;
    }

    /* Post Header */
    .post-head {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 10px;
    }
    .post-head-av-wrap {
      width: 32px; height: 32px;
      border-radius: 50%;
      padding: 2px;
      flex-shrink: 0;
    }
    .post-head-av-wrap.active {
      background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    }
    .post-head-av-wrap.inactive {
      background: var(--border);
    }
    .post-head-av {
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
    }
    .post-head-info { flex: 1; }
    .post-head-username {
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }
    .post-head-username:hover { text-decoration: underline; }
    .post-head-location {
      font-size: 12px;
      color: var(--muted);
    }
    .post-more {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      line-height: 1;
      padding: 0 4px;
    }

    /* Post Image */
    .post-image {
      width: 100%;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .post-image-icon { opacity: 0.5; }
    .post-image-label { font-size: 13px; color: rgba(255,255,255,0.7); }

    /* Double-tap heart */
    .heart-overlay {
      position: absolute;
      pointer-events: none;
      display: none;
      align-items: center;
      justify-content: center;
      inset: 0;
    }
    .heart-overlay.show {
      display: flex;
      animation: heart-burst 0.8s ease forwards;
    }
    @keyframes heart-burst {
      0% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 1; transform: scale(1.3); }
      60% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }

    /* Post Actions */
    .post-actions {
      display: flex;
      align-items: center;
      padding: 10px 16px 6px;
      gap: 16px;
    }
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      color: var(--text);
      padding: 0;
      transition: transform 0.1s;
    }
    .action-btn:hover { transform: scale(1.1); }
    .action-btn.liked svg { fill: var(--red); stroke: var(--red); }
    .save-btn { margin-left: auto; }

    .post-dots {
      display: flex;
      gap: 4px;
      margin: 0 auto;
      padding: 0 0 2px;
    }
    .dot-ind {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #a8a8a8;
      transition: background 0.2s;
    }
    .dot-ind.active { background: var(--blue); }

    .post-likes {
      padding: 0 16px 6px;
      font-size: 14px;
      font-weight: 600;
    }
    .post-caption {
      padding: 0 16px 6px;
      font-size: 14px;
      line-height: 1.5;
    }
    .post-caption .uname { font-weight: 600; margin-right: 5px; cursor: pointer; }
    .post-caption .more { color: var(--muted); cursor: pointer; }

    .post-comments-link {
      padding: 0 16px 4px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      text-align: left;
      font-family: var(--font);
    }
    .post-comments-link:hover { text-decoration: underline; }

    .post-time {
      padding: 0 16px 10px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .post-comment-input {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      gap: 12px;
    }
    .emoji-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }
    .post-comment-input input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      background: transparent;
    }
    .post-comment-input input::placeholder { color: var(--muted); }
    .post-btn {
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .post-btn.visible { opacity: 1; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: sticky;
      top: 80px;
    }
    .sidebar-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .sb-av-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg,#f58529,#dd2a7b,#8134af);
      padding: 2px;
      flex-shrink: 0;
    }
    .sb-av {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #c9a0b0;
      border: 2px solid white;
    }
    .sb-info { flex: 1; }
    .sb-username { font-size: 14px; font-weight: 600; }
    .sb-name { font-size: 14px; color: var(--muted); margin-top: 1px; }
    .sb-switch {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
    }

    .sb-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .sb-section-title { font-size: 14px; font-weight: 600; color: var(--muted); }
    .sb-see-all { font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; color: var(--text); }

    .sb-user {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .sb-user-av {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .sb-user-info { flex: 1; }
    .sb-user-name { font-size: 13px; font-weight: 600; cursor: pointer; }
    .sb-user-name:hover { text-decoration: underline; }
    .sb-user-sub { font-size: 12px; color: var(--muted); }
    .sb-follow {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
    }

    .sb-footer {
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
      line-height: 2;
    }
    .sb-footer a { color: var(--muted); text-decoration: none; margin-right: 6px; }
    .sb-footer a:hover { text-decoration: underline; }

    /* Like animation */
    .like-bounce { animation: like-bounce 0.3s cubic-bezier(.36,.07,.19,.97); }
    @keyframes like-bounce { 0%,100%{transform:scale(1)} 40%{transform:scale(1.4)} 70%{transform:scale(0.95)} }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="/home">Instagram</a>

    <div class="nav-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e8e" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search" />
    </div>

    <div class="nav-actions">
      <!-- Home -->
      <button class="nav-btn" title="Home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
      <!-- Messenger -->
      <button class="nav-btn" title="Messenger">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="notif-dot"></span>
      </button>
      <!-- New Post -->
      <button class="nav-btn" title="New post" onclick="alert('New Post — connect to Flask upload endpoint')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
      <!-- Explore -->
      <button class="nav-btn" title="Explore">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <!-- Notifications -->
      <button class="nav-btn" title="Notifications" id="notifBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </button>
      <!-- Avatar -->
      <div class="nav-avatar" title="Profile">
        <div class="nav-avatar-inner"></div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main-layout">
  <!-- FEED COLUMN -->
  <div class="feed-col">
    <!-- Stories -->
    <div class="stories-bar">
      <div class="stories-list" id="stories-list"></div>
    </div>

    <!-- Posts -->
    <div id="posts-feed"></div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-profile">
      <div class="sb-av-ring"><div class="sb-av"></div></div>
      <div class="sb-info">
        <div class="sb-username">research_user</div>
        <div class="sb-name">Researcher</div>
      </div>
      <button class="sb-switch">Switch</button>
    </div>

    <div class="sb-section">
      <span class="sb-section-title">Suggested for you</span>
      <a class="sb-see-all" href="#">See All</a>
    </div>

    <div id="suggestions-list"></div>

    <div class="sb-footer">
      <div>
        <a href="#">About</a><a href="#">Help</a><a href="#">Press</a>
        <a href="#">API</a><a href="#">Jobs</a><a href="#">Privacy</a>
        <a href="#">Terms</a><a href="#">Locations</a>
      </div>
      <div>© 2024 Instagram (Research Replica)</div>
    </div>
  </aside>
</div>

<script>
const USERS = [
  { id: 1, name: 'alex_v',    full: 'Alex V.',    color: '#e8956d', loc: 'Mumbai, India',     seen: false },
  { id: 2, name: 'priya.k',   full: 'Priya K.',   color: '#6da8e8', loc: 'Chennai, India',    seen: false },
  { id: 3, name: 'rajan_m',   full: 'Rajan M.',   color: '#6db86d', loc: 'Bengaluru, India',  seen: true  },
  { id: 4, name: 'sara_d',    full: 'Sara D.',     color: '#e86da8', loc: 'Delhi, India',      seen: false },
  { id: 5, name: 'dev_io',    full: 'Dev IO',      color: '#9d6de8', loc: 'Hyderabad, India',  seen: true  },
  { id: 6, name: 'neural_n',  full: 'Neural N.',   color: '#e8c96d', loc: 'Pune, India',       seen: false },
];

const POSTS = [
  { id: 1, user: USERS[0], color: '#d4a8a8', caption: 'Golden hour never gets old 🌇✨', likes: 1247, comments: 34, time: '2 HOURS AGO', active: true, saved: false, liked: false },
  { id: 2, user: USERS[1], color: '#a8c4d4', caption: 'Excited about my new research on network anomaly detection! UNSW-NB15 dataset is fascinating 🔬 #MachineLearning #Cybersecurity', likes: 892, comments: 21, time: '5 HOURS AGO', active: true, saved: false, liked: false },
  { id: 3, user: USERS[2], color: '#b8d4a8', caption: 'Coffee + code = productivity ☕💻 Anyone else work like this?', likes: 2103, comments: 56, time: '8 HOURS AGO', active: false, saved: false, liked: true },
  { id: 4, user: USERS[3], color: '#d4b8d4', caption: 'Beautiful sunrise this morning 🌅 Grateful for every day.', likes: 3441, comments: 89, time: '12 HOURS AGO', active: false, saved: false, liked: false },
];

function initials(name) { return name.slice(0, 2).toUpperCase(); }

// ─── STORIES ───
const sl = document.getElementById('stories-list');
sl.innerHTML = `
  <div class="story-item">
    <div class="story-add-ring" style="width:56px;height:56px;border-radius:50%;background:#efefef;display:flex;align-items:center;justify-content:center;position:relative;">
      <div style="width:40px;height:40px;border-radius:50%;background:#c9a0b0;"></div>
      <div class="story-add-icon">+</div>
    </div>
    <div class="story-name" style="font-size:11px;text-align:center;margin-top:5px;">Your story</div>
  </div>`;
USERS.forEach(u => {
  sl.innerHTML += `
    <div class="story-item" onclick="viewStory('${u.name}')">
      <div class="story-ring ${u.seen ? 'seen' : ''}">
        <div class="story-av" style="background:${u.color};">${initials(u.name)}</div>
      </div>
      <div class="story-name">${u.name}</div>
    </div>`;
});

// ─── SUGGESTIONS ───
const sugg = document.getElementById('suggestions-list');
USERS.slice(2, 7).forEach(u => {
  sugg.innerHTML += `
    <div class="sb-user">
      <div class="sb-user-av" style="background:${u.color};">${initials(u.name)}</div>
      <div class="sb-user-info">
        <div class="sb-user-name">${u.name}</div>
        <div class="sb-user-sub">Suggested for you</div>
      </div>
      <button class="sb-follow" onclick="followUser(this, '${u.name}')">Follow</button>
    </div>`;
});

// ─── POSTS ───
const feed = document.getElementById('posts-feed');
POSTS.forEach(p => {
  feed.innerHTML += `
    <article class="post" id="post-${p.id}">
      <div class="post-head">
        <div class="post-head-av-wrap ${p.active ? 'active' : 'inactive'}">
          <div class="post-head-av" style="background:${p.user.color};">${initials(p.user.name)}</div>
        </div>
        <div class="post-head-info">
          <a href="#" class="post-head-username">${p.user.name}</a>
          <div class="post-head-location">${p.user.loc}</div>
        </div>
        <button class="post-more">•••</button>
      </div>

      <div class="post-image" style="background:${p.color};" ondblclick="doubleTapLike(${p.id})">
        <svg class="post-image-icon" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.8">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="post-image-label">Post Image</span>
        <div class="heart-overlay" id="heart-overlay-${p.id}">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="white"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </div>
      </div>

      <div class="post-actions">
        <button class="action-btn ${p.liked ? 'liked' : ''}" id="like-btn-${p.id}" onclick="toggleLike(${p.id})" title="Like">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="${p.liked ? '#ed4956' : 'none'}" stroke="${p.liked ? '#ed4956' : 'currentColor'}" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
        <button class="action-btn" title="Comment">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </button>
        <button class="action-btn" title="Share">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <button class="action-btn save-btn ${p.saved ? 'saved' : ''}" id="save-btn-${p.id}" onclick="toggleSave(${p.id})" title="Save" style="margin-left:auto;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="${p.saved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5"><polygon points="19 21 12 16 5 21 5 3 19 3 19 21"/></svg>
        </button>
      </div>

      <div class="post-likes" id="likes-${p.id}">${p.likes.toLocaleString()} likes</div>

      <div class="post-caption">
        <span class="uname">${p.user.name}</span>${p.caption.length > 80 ? p.caption.slice(0,80) + '… <span class="more">more</span>' : p.caption}
      </div>

      <button class="post-comments-link">View all ${p.comments} comments</button>

      <div class="post-time">${p.time}</div>

      <div class="post-comment-input">
        <button class="emoji-btn">😊</button>
        <input type="text" placeholder="Add a comment…" id="comment-input-${p.id}" oninput="commentInput(${p.id}, this.value)" />
        <button class="post-btn" id="post-btn-${p.id}" onclick="postComment(${p.id})">Post</button>
      </div>
    </article>`;
});

// ─── INTERACTIONS ───
function toggleLike(id) {
  const post = POSTS.find(p => p.id === id);
  const btn = document.getElementById('like-btn-' + id);
  const svg = btn.querySelector('svg');
  const likeEl = document.getElementById('likes-' + id);

  post.liked = !post.liked;
  if (post.liked) {
    post.likes++;
    svg.setAttribute('fill', '#ed4956');
    svg.setAttribute('stroke', '#ed4956');
    btn.classList.add('liked');
    btn.classList.add('like-bounce');
    setTimeout(() => btn.classList.remove('like-bounce'), 300);
  } else {
    post.likes--;
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    btn.classList.remove('liked');
  }
  likeEl.textContent = post.likes.toLocaleString() + ' likes';

  // Log to Flask backend (for traffic analysis)
  fetch('/api/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'like', post_id: id, liked: post.liked, ts: Date.now() })
  }).catch(() => {});
}

function doubleTapLike(id) {
  const post = POSTS.find(p => p.id === id);
  const overlay = document.getElementById('heart-overlay-' + id);
  overlay.classList.remove('show');
  void overlay.offsetWidth;
  overlay.classList.add('show');
  if (!post.liked) toggleLike(id);
}

function toggleSave(id) {
  const post = POSTS.find(p => p.id === id);
  const btn = document.getElementById('save-btn-' + id);
  const svg = btn.querySelector('svg');
  post.saved = !post.saved;
  svg.setAttribute('fill', post.saved ? 'currentColor' : 'none');
}

function commentInput(id, val) {
  const btn = document.getElementById('post-btn-' + id);
  btn.classList.toggle('visible', val.trim().length > 0);
}

function postComment(id) {
  const input = document.getElementById('comment-input-' + id);
  const val = input.value.trim();
  if (!val) return;
  const post = POSTS.find(p => p.id === id);
  post.comments++;
  document.querySelector(`#post-${id} .post-comments-link`).textContent = `View all ${post.comments} comments`;
  input.value = '';
  commentInput(id, '');

  fetch('/api/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'comment', post_id: id, text: val, ts: Date.now() })
  }).catch(() => {});
}

function followUser(btn, username) {
  btn.textContent = btn.textContent === 'Follow' ? 'Following' : 'Follow';
  btn.style.color = btn.textContent === 'Following' ? '#8e8e8e' : '#0095f6';
}

function viewStory(username) {
  alert(`Story by ${username} — connect to Flask story endpoint`);
}
</script>
